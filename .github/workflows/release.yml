name: Release

# Publishes to NuGet when a version tag (e.g. v1.0.0) is pushed.
# One-time NuGet Trusted Publishing (OIDC) setup + a NUGET_USER repo variable are
# required before the first release. See the "Releasing (maintainers)" section in CONTRIBUTING.md.
on:
  push:
    tags: [ 'v*.*.*' ]

permissions:
  contents: write   # create the GitHub Release
  id-token: write   # NuGet Trusted Publishing (OIDC) — no long-lived API key needed

# Never cancel an in-flight publish.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # MinVer derives the version from the tag

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Restore
        run: dotnet restore --locked-mode

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build

      - name: Pack
        run: dotnet pack --configuration Release --no-build --output ./artifacts

      # Authenticate via short-lived OIDC token instead of a stored API key.
      # Kept immediately before the push: the temporary key is valid ~1 hour.
      - name: NuGet login (Trusted Publishing)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ vars.NUGET_USER }}

      # Push each package on its own, with retries. A single glob push aborts the whole
      # batch on one transient NuGet error — which once left the family half-published.
      # Here every package is attempted, each retried with backoff; --skip-duplicate keeps
      # retries (and re-runs) idempotent. The step fails only if something still can't push.
      - name: Push to NuGet
        shell: bash
        env:
          NUGET_API_KEY: ${{ steps.login.outputs.NUGET_API_KEY }}
        run: |
          set -uo pipefail
          source="https://api.nuget.org/v3/index.json"
          failed=()
          for pkg in ./artifacts/*.nupkg; do
            name=$(basename "$pkg")
            pushed=0
            for attempt in 1 2 3 4 5; do
              echo "::group::push $name (attempt $attempt)"
              if dotnet nuget push "$pkg" --api-key "$NUGET_API_KEY" --source "$source" --skip-duplicate; then
                pushed=1
                echo "::endgroup::"
                break
              fi
              echo "::endgroup::"
              wait=$((attempt * 15))
              echo "push failed for $name (attempt $attempt); retrying in ${wait}s"
              sleep "$wait"
            done
            [ "$pushed" -eq 1 ] || failed+=("$name")
          done
          if [ ${#failed[@]} -ne 0 ]; then
            echo "::error::Failed to push after retries: ${failed[*]}"
            exit 1
          fi
          echo "All packages pushed."

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ./artifacts/*.nupkg
            ./artifacts/*.snupkg
