name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # allow manual runs from the Actions tab

permissions:
  contents: read

# Cancel superseded runs on the same branch/PR to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest ]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # MinVer needs full history + tags

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Restore
        run: dotnet restore --locked-mode

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --collect:"XPlat Code Coverage" --logger "trx;LogFileName=test-results.trx" --results-directory ./coverage

      - name: Test report (PR summary)
        if: ${{ always() && matrix.os == 'ubuntu-latest' }}
        run: python3 build/test-summary.py --dir ./coverage

      - name: Coverage gate (line >= 85%)
        if: matrix.os == 'ubuntu-latest'
        run: python3 build/coverage-gate.py --threshold 85 --dir ./coverage

      - name: Pack (verify packaging succeeds)
        run: dotnet pack --configuration Release --no-build --output ./artifacts

      - name: Upload packages
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: ./artifacts/*.nupkg
